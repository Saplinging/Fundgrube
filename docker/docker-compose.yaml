version: '3.8'
services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    volumes:
      - ../backend/uploads:/app/backend/uploads
    environment:
      - VISION_PROVIDER=dummy
      - CHAT_PROVIDER=dummy
      - EMBEDDING_PROVIDER=dummy
    ports:
      - "8000:8000"
    restart: unless-stopped
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
